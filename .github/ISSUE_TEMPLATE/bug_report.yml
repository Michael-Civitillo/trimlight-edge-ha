name: Bug Report
description: Report a bug with the Trimlight Edge integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [existing issues](https://github.com/Michael-Civitillo/trimlight-edge-ha/issues) and ensure you are on the latest version.

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2024.6.0"
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Enable debug logging by adding this to your `configuration.yaml`:
        ```yaml
        logger:
          logs:
            custom_components.trimlight: debug
        ```
        Then paste the relevant lines here.
      render: shell
